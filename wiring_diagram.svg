<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .label { font: 16px sans-serif; font-weight: bold; fill: #111; }
      .sublabel { font: 12px sans-serif; fill: #666; }
      .pin { font: 11px monospace; fill: #111; }
      .wire { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .board { fill: #f8f8f8; stroke: #333; stroke-width: 2; }
      .component { stroke: #333; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- ARDUINO BOARD - Left side, top -->
  <g id="arduino">
    <rect x="30" y="30" width="280" height="220" rx="8" ry="8" class="board" />
    <text x="170" y="55" text-anchor="middle" class="label">Arduino Board</text>
    <text x="170" y="72" text-anchor="middle" class="sublabel">(Uno / Nano)</text>

    <!-- Left side pins -->
    <line x1="50" y1="95" x2="30" y2="95" stroke="#333" stroke-width="2" />
    <circle cx="30" cy="95" r="3" fill="#e53935" />
    <text x="60" y="100" class="pin">5V</text>

    <line x1="50" y1="125" x2="30" y2="125" stroke="#333" stroke-width="2" />
    <circle cx="30" cy="125" r="3" fill="#616161" />
    <text x="60" y="130" class="pin">GND</text>

    <line x1="50" y1="155" x2="30" y2="155" stroke="#333" stroke-width="2" />
    <circle cx="30" cy="155" r="3" fill="#1e88e5" />
    <text x="60" y="160" class="pin">A0</text>

    <line x1="50" y1="185" x2="30" y2="185" stroke="#333" stroke-width="2" />
    <circle cx="30" cy="185" r="3" fill="#039be5" />
    <text x="60" y="190" class="pin">SDA (A4)</text>

    <line x1="50" y1="215" x2="30" y2="215" stroke="#333" stroke-width="2" />
    <circle cx="30" cy="215" r="3" fill="#0288d1" />
    <text x="60" y="220" class="pin">SCL (A5)</text>

    <!-- Right side pins -->
    <line x1="290" y1="95" x2="310" y2="95" stroke="#333" stroke-width="2" />
    <circle cx="310" cy="95" r="3" fill="#43a047" />
    <text x="250" y="100" text-anchor="end" class="pin">D13</text>

    <line x1="290" y1="125" x2="310" y2="125" stroke="#333" stroke-width="2" />
    <circle cx="310" cy="125" r="3" fill="#8e24aa" />
    <text x="250" y="130" text-anchor="end" class="pin">D2</text>
  </g>

  <!-- LDR & RESISTOR DIVIDER - Top right -->
  <g id="ldr-circuit">
    <rect x="580" y="30" width="240" height="220" rx="8" ry="8" class="board" />
    <text x="700" y="55" text-anchor="middle" class="label">LDR Circuit</text>

    <!-- LDR component -->
    <circle cx="640" cy="110" r="18" class="component" fill="#ffd700" />
    <line x1="628" y1="98" x2="616" y2="86" stroke="#333" stroke-width="2" />
    <line x1="652" y1="122" x2="664" y2="134" stroke="#333" stroke-width="2" />
    <text x="640" y="165" text-anchor="middle" class="pin">LDR</text>

    <!-- 10kΩ Resistor -->
    <g transform="translate(760, 125)">
      <rect x="-20" y="-8" width="40" height="16" class="component" fill="#fff" />
      <text x="0" y="30" text-anchor="middle" class="pin">10 kΩ</text>
    </g>

    <!-- Connection point (junction) -->
    <circle cx="700" cy="125" r="4" fill="#333" />
    <text x="700" y="175" text-anchor="middle" class="sublabel">Junction</text>
  </g>

  <!-- LED & BUTTON - Bottom left -->
  <g id="led-button">
    <rect x="30" y="520" width="280" height="220" rx="8" ry="8" class="board" />
    <text x="170" y="545" text-anchor="middle" class="label">LED  Button</text>

    <!-- LED -->
    <g transform="translate(100, 600)">
      <polygon points="0,-15 25,0 0,15" class="component" fill="#ffb3b3" />
      <rect x="28" y="-5" width="20" height="10" class="component" fill="#ccc" />
      <text x="0" y="50" text-anchor="middle" class="pin">LED</text>
      <text x="0" y="65" text-anchor="middle" class="sublabel">+ anode</text>
    </g>

    <!-- Button -->
    <g transform="translate(220, 600)">
      <rect x="-18" y="-12" width="36" height="24" rx="4" class="component" fill="#ddd" />
      <text x="0" y="50" text-anchor="middle" class="pin">Button</text>
      <text x="0" y="65" text-anchor="middle" class="sublabel">Push to GND</text>
    </g>
  </g>

  <!-- I2C LCD DISPLAY - Right side, middle -->
  <g id="lcd">
    <rect x="900" y="280" width="250" height="180" rx="8" ry="8" class="board" />
    <text x="1025" y="305" text-anchor="middle" class="label">I2C LCD</text>
    <text x="1025" y="325" text-anchor="middle" class="sublabel">16x2 Display</text>

    <!-- LCD screen simulation -->
    <rect x="920" y="345" width="210" height="75" rx="4" fill="#000" />
    <text x="1025" y="385" text-anchor="middle" class="label" fill="#0f0">Arduino Project</text>

    <!-- Connection points -->
    <circle cx="910" cy="445" r="3" fill="#039be5" />
    <text x="920" y="450" class="pin">SDA</text>

    <circle cx="910" cy="475" r="3" fill="#0288d1" />
    <text x="920" y="480" class="pin">SCL</text>

    <circle cx="1140" cy="445" r="3" fill="#e53935" />
    <text x="1130" y="450" text-anchor="end" class="pin">+5V</text>

    <circle cx="1140" cy="475" r="3" fill="#616161" />
    <text x="1130" y="480" text-anchor="end" class="pin">GND</text>
  </g>

  <!-- WIRES -->
  <!-- 5V rail (red) - Arduino to LDR -->
  <path d="M 30 95 L -20 95 L -20 40 L 580 40 L 580 95" class="wire" stroke="#e53935" />
  <text x="300" y="35" class="sublabel" fill="#e53935">+5V (Power)</text>

  <!-- GND rail (black) - Arduino to components -->
  <path d="M 30 125 L -20 125 L -20 280 L 30 280" class="wire" stroke="#616161" />
  <text x="5" y="200" class="sublabel" fill="#616161">GND</text>

  <!-- LDR to junction -->
  <path d="M 658 128 L 658 145 L 700 145 L 700 140" class="wire" stroke="#1e88e5" />

  <!-- Resistor to GND -->
  <path d="M 780 133 L 780 280 L 30 280" class="wire" stroke="#616161" />

  <!-- A0 from junction to Arduino -->
  <path d="M 700 110 L 700 75 L 380 75 L 380 155 L 310 155" class="wire" stroke="#1e88e5" />
  <text x="500" y="70" class="sublabel" fill="#1e88e5">A0 (Analog)</text>

  <!-- D13 to LED anode -->
  <path d="M 310 95 L 380 95 L 380 600 L 100 600" class="wire" stroke="#43a047" />
  <text x="360" y="85" class="sublabel" fill="#43a047">D13</text>

  <!-- LED cathode to GND -->
  <path d="M 75 615 L 30 615 L 30 640 L 30 740" class="wire" stroke="#616161" />

  <!-- D2 to Button -->
  <path d="M 310 125 L 420 125 L 420 600 L 220 600" class="wire" stroke="#8e24aa" />
  <text x="420" y="115" class="sublabel" fill="#8e24aa">D2</text>

  <!-- Button to GND -->
  <path d="M 238 612 L 30 612 L 30 740" class="wire" stroke="#616161" />

  <!-- SDA from Arduino to LCD -->
  <path d="M 30 185 L 10 185 L 10 445 L 910 445" class="wire" stroke="#039be5" />
  <text x="450" y="310" class="sublabel" fill="#039be5">I2C Bus</text>

  <!-- SCL from Arduino to LCD -->
  <path d="M 30 215 L 10 215 L 10 475 L 910 475" class="wire" stroke="#0288d1" />

  <!-- LCD +5V -->
  <path d="M 580 75 L 1000 75 L 1000 95 L 1140 95 L 1140 445" class="wire" stroke="#e53935" />

  <!-- LCD GND -->
  <path d="M 30 280 L 10 280 L 10 475 L 1010 475 L 1140 475" class="wire" stroke="#616161" />

  <!-- LEGEND / NOTES -->
  <g id="legend">
    <rect x="30" y="750" width="1140" height="40" rx="4" fill="#fffacd" stroke="#999" stroke-width="1" />
    <text x="50" y="770" class="sublabel">
      <tspan font-weight="bold">Connection Summary:</tspan>
      <tspan x="350" font-size="11px">Red = +5V Power | Black = GND (Ground) | Blue = A0 Analog | Purple = D13 LED | Magenta = D2 Button | Cyan = I2C Display</tspan>
    </text>
  </g>
</svg>

